<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Calendario Escolar</title>

<style>

body {

    font-family: Arial, sans-serif;

    background: #f2f4f8;

    margin: 20px;

}

h1 {

    text-align: center;

}

.container {

    max-width: 700px;

    margin: auto;

}

form {

    background: white;

    padding: 15px;

    border-radius: 10px;

    box-shadow: 0 2px 8px rgba(0,0,0,0.1);

}

input, button {

    padding: 10px;

    margin: 5px;

    width: 95%;

}

.evento {

    margin-top: 15px;

    padding: 15px;

    border-radius: 10px;

    font-weight: bold;

    box-shadow: 0 2px 6px rgba(0,0,0,0.1);

}

.rojo { background: #f8d7da; color: #721c24; }

.amarillo { background: #fff3cd; color: #856404; }

.verde { background: #d4edda; color: #155724; }

</style>

</head>

<body>

<div class="container">

<h1>📚 Calendario Escolar</h1>

<form id="form">

    <input type="text" id="nombre" placeholder="Nombre del examen o evento" required>

    <input type="date" id="fecha" required>

    <button type="submit">Agregar evento</button>

</form>

<div id="lista"></div>

</div>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

function diasFaltan(fecha) {

    const hoy = new Date();

    const evento = new Date(fecha);

    const diff = Math.ceil((evento - hoy) / (1000 * 60 * 60 * 24));

    return diff;

}

function colorDias(dias) {

    if (dias <= 5) return "rojo";

    if (dias <= 10) return "amarillo";

    return "verde";

}

function mostrar() {

    const lista = document.getElementById("lista");

    lista.innerHTML = "";

    eventos.forEach(e => {

        let dias = diasFaltan(e.fecha);

        let color = colorDias(dias);

        lista.innerHTML += `

            <div class="evento ${color}">

                ${e.nombre} <br>

                Faltan ${dias} días

            </div>

        `;

    });

}

document.getElementById("form").addEventListener("submit", function(e){

    e.preventDefault();

    let nuevo = {

        nombre: document.getElementById("nombre").value,

        fecha: document.getElementById("fecha").value

    };

    eventos.push(nuevo);

    localStorage.setItem("eventos", JSON.stringify(eventos));

    this.reset();

    mostrar();

});

mostrar();

</script>

</body>

</html><!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📚 Calendario Escolar PRO</title>



<style>

body {

    font-family: Arial, sans-serif;

    background: #eef2f7;

    margin: 0;

    padding: 20px;

}



h1 {

    text-align: center;

    color: #333;

}



.container {

    max-width: 650px;

    margin: auto;

}



form {

    background: white;

    padding: 15px;

    border-radius: 12px;

    box-shadow: 0 3px 10px rgba(0,0,0,0.1);

}



input, button {

    width: 100%;

    padding: 10px;

    margin-top: 8px;

    border-radius: 8px;

    border: 1px solid #ccc;

}



button {

    background: #1976d2;

    color: white;

    font-weight: bold;

    cursor: pointer;

}



button:hover {

    background: #125aa3;

}



.evento {

    margin-top: 15px;

    padding: 15px;

    border-radius: 12px;

    font-weight: bold;

    box-shadow: 0 2px 8px rgba(0,0,0,0.1);

    position: relative;

}



.rojo { background: #ffd6d6; border-left: 8px solid #e53935; }

.amarillo { background: #fff4c2; border-left: 8px solid #fbc02d; }

.verde { background: #d6ffd6; border-left: 8px solid #43a047; }



.fecha {

    font-size: 13px;

    font-weight: normal;

    margin-top: 5px;

}



.eliminar {

    position: absolute;

    right: 10px;

    top: 10px;

    background: red;

    color: white;

    border: none;

    border-radius: 5px;

    padding: 5px 8px;

    cursor: pointer;

}

</style>

</head>



<body>



<h1>📚 Calendario Escolar PRO</h1>



<div class="container">



<form id="form">

    <input type="text" id="nombre" placeholder="Nombre del examen o tarea" required>

    <input type="date" id="fecha" required>

    <button type="submit">➕ Agregar</button>

</form>



<div id="lista"></div>



</div>



<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];



function diasFaltan(fecha) {

    let hoy = new Date();

    let evento = new Date(fecha);

    return Math.ceil((evento - hoy) / (1000 * 60 * 60 * 24));

}



function color(dias) {

    if (dias <= 5) return "rojo";

    if (dias <= 10) return "amarillo";

    return "verde";

}



function guardar() {

    localStorage.setItem("eventos", JSON.stringify(eventos));

}



function eliminar(i) {

    eventos.splice(i, 1);

    guardar();

    mostrar();

}



function mostrar() {

    let lista = document.getElementById("lista");

    lista.innerHTML = "";



    eventos.forEach((e, i) => {

        let dias = diasFaltan(e.fecha);



        if (dias < -2) return; // elimina visualmente después de 2 días



        let clase = color(dias);



        lista.innerHTML += `

            <div class="evento ${clase}">

                <button class="eliminar" onclick="eliminar(${i})">X</button>

                📌 ${e.nombre}

                <div class="fecha">Faltan ${dias} días</div>

            </div>

        `;

    });

}



document.getElementById("form").addEventListener("submit", e => {

    e.preventDefault();



    eventos.push({

        nombre: document.getElementById("nombre").value,

        fecha: document.getElementById("fecha").value

    });



    guardar();

    e.target.reset();

    mostrar();

});



mostrar();

</script>



</body>

</html>
