


 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Escolar</title>

<style>
body{
    font-family: Arial;
    background:#f2f4f8;
    margin:0;
    padding:20px;
}

/* TOP BAR */
.topbar{
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    margin-bottom:15px;
}

.topbar h1{
    margin:0;
    font-size:22px;
}

.menu-btn{
    position:absolute;
    left:0;
    top:50%;
    transform:translateY(-50%);
    font-size:24px;
    background:white;
    border:none;
    border-radius:8px;
    padding:8px 12px;
    cursor:pointer;
}

/* MENU */
.menu{
    position:fixed;
    top:0;
    left:-260px;
    width:240px;
    height:100%;
    background:white;
    box-shadow:2px 0 10px rgba(0,0,0,0.2);
    padding:15px;
    transition:0.3s;
    z-index:1002;
}

.menu.open{left:0;}

.overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:1000;
}

.overlay.show{display:block;}

button{
    width:100%;
    margin-top:8px;
    padding:10px;
}

/* COLORES */
.rojo{background:#ffd6d6;}
.amarillo{background:#fff4c2;}
.verde{background:#d6ffd6;}

.evento{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    font-weight:bold;
}

/* CALENDARIO */
#calendario{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
    margin-top:20px;
}

.dia{
    background:white;
    padding:6px;
    border-radius:6px;
    min-height:50px;
    font-size:12px;
}

.evento-mini{
    font-size:10px;
    background:#ddd;
    margin-top:2px;
    border-radius:4px;
    padding:2px;
}

/* VOLUMEN */
input[type=range]{
    width:100%;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <button id="menuBtn" class="menu-btn">☰</button>
    <h1>📚 Calendario Escolar</h1>
</div>

<!-- MENU -->
<div id="overlay" class="overlay"></div>

<div id="menu" class="menu">

    <h3>📂 Filtros</h3>
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('rojo')">🔴 Urgentes</button>
    <button onclick="filtrar('amarillo')">🟡 Próximos</button>
    <button onclick="filtrar('verde')">🟢 Lejanos</button>

    <hr>

    <h3>🎵 Música</h3>
    <button onclick="toggleMusica()">▶ Activar música</button>

    <label>Volumen</label>
    <input type="range" min="0" max="1" step="0.1"
    id="volumen">

</div>

<!-- FORM -->
<form id="form">
    <input id="nombre" placeholder="Tarea o examen" required>
    <input type="date" id="fecha" required>
    <button>Agregar</button>
</form>

<!-- LISTA -->
<div id="lista"></div>

<!-- CALENDARIO -->
<h2>📅 Calendario</h2>
<div id="calendario"></div>

<!-- AUDIO -->
<audio id="musica" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_7c8b1c1c7d.mp3?filename=soft-piano-ambient-118602.mp3">
</audio>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];
let filtro = "todos";

const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const musica = document.getElementById("musica");

/* MENU */
document.getElementById("menuBtn").onclick = ()=>{
    menu.classList.add("open");
    overlay.classList.add("show");
};

overlay.onclick = cerrarMenu;

function cerrarMenu(){
    menu.classList.remove("open");
    overlay.classList.remove("show");
}

/* FILTRO */
function filtrar(f){
    filtro = f;
    mostrar();
    cerrarMenu();
}

/* DIAS */
function diasFaltan(fecha){
    const hoy = new Date();
    hoy.setHours(0,0,0,0);

    const e = new Date(fecha);
    e.setHours(0,0,0,0);

    return Math.ceil((e-hoy)/(1000*60*60*24));
}

/* COLOR */
function color(d){
    if(d<=5) return "rojo";
    if(d<=10) return "amarillo";
    return "verde";
}

/* MOSTRAR */
function mostrar(){

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    eventos.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

    eventos.forEach((e,i)=>{

        let d = diasFaltan(e.fecha);
        let c = color(d);

        if(filtro!=="todos" && filtro!==c) return;

        let texto = d===0 ? "🔥 Hoy" : `⏳ ${d} días`;

        lista.innerHTML += `
        <div class="evento ${c}">
            ${e.nombre}<br>
            📅 ${e.fecha}<br>
            ${texto}
        </div>`;
    });

    guardar();
    renderCalendario();
}

/* GUARDAR */
function guardar(){
    localStorage.setItem("eventos", JSON.stringify(eventos));
}

/* FORM */
document.getElementById("form").addEventListener("submit",e=>{
    e.preventDefault();

    eventos.push({
        nombre:nombre.value,
        fecha:fecha.value
    });

    nombre.value="";
    fecha.value="";

    mostrar();
});

/* CALENDARIO */
function renderCalendario(){

    const cont = document.getElementById("calendario");
    cont.innerHTML = "";

    const hoy = new Date();
    const mes = hoy.getMonth();
    const año = hoy.getFullYear();

    const primer = new Date(año,mes,1).getDay();
    const diasMes = new Date(año,mes+1,0).getDate();

    for(let i=0;i<primer;i++){
        cont.innerHTML += `<div class="dia"></div>`;
    }

    for(let d=1; d<=diasMes; d++){

        let fecha = `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        let ev = eventos.filter(e=>e.fecha===fecha);

        let html = `<strong>${d}</strong>`;

        ev.forEach(e=>{
            html += `<div class="evento-mini">${e.nombre}</div>`;
        });

        cont.innerHTML += `<div class="dia">${html}</div>`;
    }
}

/* MUSICA */
document.getElementById("volumen").addEventListener("input",(e)=>{
    musica.volume = e.target.value;
});

function toggleMusica(){
    musica.volume = document.getElementById("volumen").value || 0.3;
    musica.play();
}

/* AUTOPLAY BLOQUEO */
document.addEventListener("click",()=>{
    musica.volume = 0.3;
    musica.play();
},{once:true});

/* INIT */
mostrar();

</script>

</body>
</html>
