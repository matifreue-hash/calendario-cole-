<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Pro Dark</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0a0a;
  color:white;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111;
}

/* MENU */
.menu{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#0f172a;
  padding:15px;
  transition:.3s;
}

.menu.open{left:0;}

.menu button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
}

/* CALENDAR */
.container{
  max-width:900px;
  margin:auto;
  padding:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  background:#111;
  min-height:70px;
  border-radius:10px;
  padding:6px;
  cursor:pointer;
  border:1px solid #222;
}

/* COLORS */
.rojo{border:2px solid #ef4444;}
.amarillo{border:2px solid #f59e0b;}
.verde{border:2px solid #22c55e;}

.badge{
  font-size:10px;
  display:block;
  margin-top:3px;
  background:#222;
  padding:2px 4px;
  border-radius:6px;
}

/* TASK LIST */
.task{
  background:#111;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{display:flex;}

.box{
  background:#111;
  padding:15px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  background:#0a0a0a;
  color:white;
}

button{
  cursor:pointer;
}

.btn{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <button onclick="toggleMenu()">☰</button>
  <div>📅 Calendario Pro</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <button onclick="home()">🏠 Iniciar</button>
  <button onclick="scrollTasks()">📋 Tareas</button>
  <button onclick="toggleMenu()">❌ Cerrar</button>
</div>

<!-- MAIN -->
<div class="container">

  <h2 id="title"></h2>

  <div class="grid" id="cal"></div>

  <h3>📋 Tareas / Exámenes</h3>
  <div id="list"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Nueva tarea</h3>
    <input id="name" placeholder="Nombre">
    <input id="hora" type="time">
    <button class="btn" onclick="save()">Guardar</button>
  </div>
</div>

<script>

let eventos = JSON.parse(localStorage.getItem("e")||"[]");
let date = new Date();
let selected = null;

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function home(){
  date = new Date();
  render();
}

function scrollTasks(){
  document.getElementById("list").scrollIntoView({behavior:"smooth"});
}

/* CALENDAR */
function render(){

  const cal=document.getElementById("cal");
  cal.innerHTML="";

  let y=date.getFullYear();
  let m=date.getMonth();

  document.getElementById("title").innerText =
  date.toLocaleString("es",{month:"long",year:"numeric"});

  let first=new Date(y,m,1).getDay();
  let days=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1; d<=days; d++){

    let f=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let ev=eventos.filter(e=>e.fecha===f);

    let clase=getColor(f);

    let html=`<strong>${d}</strong>`;

    ev.forEach(e=>{
      html+=`<span class="badge">${e.nombre}</span>`;
    });

    cal.innerHTML+=`
      <div class="day ${clase}" onclick="openTask('${f}')">
        ${html}
      </div>`;
  }

  renderList();
}

/* COLOR LOGIC */
function getColor(fecha){
  let ev=eventos.filter(e=>e.fecha===fecha);
  if(!ev.length) return "";

  let hoy=new Date();
  let f=new Date(fecha);
  let diff=(f-hoy)/86400000;

  if(diff<=5) return "rojo";
  if(diff<=10) return "amarillo";
  return "verde";
}

/* LIST */
function renderList(){

  let list=document.getElementById("list");
  list.innerHTML="";

  eventos.forEach((e,i)=>{
    list.innerHTML+=`
      <div class="task">
        <div>
          <b>${e.nombre}</b><br>
          <small>${e.fecha} ${e.hora||""}</small>
        </div>
        <button onclick="del(${i})">✕</button>
      </div>`;
  });
}

/* CREATE */
function openTask(f){
  selected=f;
  document.getElementById("modal").classList.add("active");
}

function save(){

  let n=document.getElementById("name").value;
  let h=document.getElementById("hora").value;

  if(!n||!selected) return;

  eventos.push({
    nombre:n,
    fecha:selected,
    hora:h
  });

  localStorage.setItem("e",JSON.stringify(eventos));

  document.getElementById("modal").classList.remove("active");

  render();

  checkAlarm();
}

/* DELETE */
function del(i){
  eventos.splice(i,1);
  localStorage.setItem("e",JSON.stringify(eventos));
  render();
}

/* ALARM SYSTEM */
function checkAlarm(){

  let now=new Date();
  let h=String(now.getHours()).padStart(2,"0");
  let m=String(now.getMinutes()).padStart(2,"0");

  let today=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  eventos.forEach(e=>{
    if(e.fecha===today && e.hora===`${h}:${m}`){
      if(Notification.permission==="granted"){
        new Notification("📅 Recordatorio",{
          body:e.nombre
        });
      }
    }
  });
}

/* LOOP ALARMA */
setInterval(checkAlarm,60000);

/* INIT */
window.addEventListener("DOMContentLoaded",()=>{
  if(Notification.permission!=="granted"){
    Notification.requestPermission();
  }
  render();
});

</script>

</body>
</html>
