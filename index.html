

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Escolar Pro</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f4f8;
    margin:0;
    padding:20px;
}

h1{text-align:center;}

form{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input, button{
    width:100%;
    padding:10px;
    margin-top:8px;
    box-sizing:border-box;
}

.filtros{
    display:flex;
    gap:5px;
    margin:10px 0;
}

.filtros button{flex:1;}

.evento{
    margin-top:12px;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    position:relative;
}

.rojo{background:#ffd6d6;border-left:6px solid red;}
.amarillo{background:#fff4c2;border-left:6px solid orange;}
.verde{background:#d6ffd6;border-left:6px solid green;}

button.edit{
    position:absolute;
    right:10px;
    top:10px;
    width:auto;
}

/* MENU */
.menu-btn{
    position:fixed;
    top:15px;
    left:15px;
    font-size:24px;
    background:white;
    border:none;
    border-radius:8px;
    padding:8px 12px;
    z-index:1001;
    cursor:pointer;
}

.menu{
    position:fixed;
    top:0;
    left:-260px;
    width:250px;
    height:100%;
    background:white;
    box-shadow:2px 0 10px rgba(0,0,0,0.2);
    padding:20px;
    transition:0.3s;
    z-index:1002;
}

.menu.open{left:0;}

.overlay{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:1000;
}

.overlay.show{display:block;}

.punto-hoy{
    display:inline-block;
    width:12px;
    height:12px;
    background:black;
    border-radius:50%;
    margin-right:8px;
}
</style>
</head>

<body>

<h1>📚 Calendario Escolar</h1>

<button id="menuBtn" class="menu-btn">☰</button>

<div id="overlay" class="overlay"></div>

<div id="menu" class="menu">

    <h3>📂 Filtros</h3>
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('rojo')">🔴 Urgentes</button>
    <button onclick="filtrar('amarillo')">🟡 Próximos</button>
    <button onclick="filtrar('verde')">🟢 Lejanos</button>

    <hr>

    <h3>⚙️ Configuración</h3>

    <label>🔊 Volumen música</label>
    <input type="range" min="0" max="1" step="0.1" value="0.3"
    id="volumenInput">

    <button onclick="toggleSilencio()" id="silencioBtn">
        🔊 Silenciar notificaciones
    </button>

    <hr>

    <h3>🎵 Música</h3>

    <button onclick="toggleMusica()">
        ▶ Activar música tranquila
    </button>

</div>

<form id="form">
    <input id="nombre" placeholder="Tarea o examen" required>
    <input type="date" id="fecha" required>
    <button type="submit">Agregar</button>
</form>

<div id="lista"></div>

<audio id="musica" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_7c8b1c1c7d.mp3?filename=soft-piano-ambient-118602.mp3">
</audio>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];
let filtro = "todos";

let notificacionesSilenciadas = false;
let musicaActiva = false;

const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const menuBtn = document.getElementById("menuBtn");

const musica = document.getElementById("musica");

/* MENU */
menuBtn.onclick = ()=> {
    menu.classList.add("open");
    overlay.classList.add("show");
};

overlay.onclick = cerrarMenu;

menu.querySelectorAll("button").forEach(b=>{
    b.addEventListener("click", cerrarMenu);
});

function cerrarMenu(){
    menu.classList.remove("open");
    overlay.classList.remove("show");
}

/* CALENDARIO */

function diasFaltan(fecha){
    const hoy = new Date();
    hoy.setHours(0,0,0,0);

    const evento = new Date(fecha);
    evento.setHours(0,0,0,0);

    return Math.ceil((evento - hoy)/(1000*60*60*24));
}

function color(d){
    if(d<=5) return "rojo";
    if(d<=10) return "amarillo";
    return "verde";
}

function formatearFecha(f){
    return new Date(f+"T00:00:00").toLocaleDateString("es-AR");
}

function guardar(){
    localStorage.setItem("eventos", JSON.stringify(eventos));
}

function mostrar(){

    eventos.sort((a,b)=> new Date(a.fecha)-new Date(b.fecha));

    let lista = document.getElementById("lista");
    lista.innerHTML="";

    eventos.forEach((e,i)=>{

        let d = diasFaltan(e.fecha);
        let c = color(d);

        if(filtro!=="todos" && filtro!==c) return;

        let msg = d===0 ? "🔥 Hoy" : `⏳ ${d} días`;

        lista.innerHTML += `
        <div class="evento ${c}">
            ${e.nombre}<br>
            📅 ${formatearFecha(e.fecha)}<br>
            ${msg}
            <button class="edit" onclick="editar(${i})">✏️</button>
        </div>`;
    });

    guardar();
}

/* EDITAR */
function editar(i){
    let n = prompt("Editar:", eventos[i].nombre);
    if(n){
        eventos[i].nombre = n;
        mostrar();
    }
}

/* FILTRO */
function filtrar(f){
    filtro = f;
    mostrar();
}

/* FORM */
document.getElementById("form").addEventListener("submit",e=>{
    e.preventDefault();

    eventos.push({
        nombre: nombre.value,
        fecha: fecha.value
    });

    nombre.value="";
    fecha.value="";

    mostrar();
});

/* NOTIFICACIONES */
function mensaje(){
    let p = eventos
    .map(e=>({ ...e, d:diasFaltan(e.fecha)}))
    .filter(e=>e.d>=0)
    .sort((a,b)=>a.d-b.d)
    .slice(0,3);

    if(p.length===0) return null;

    return p.map(e=>
        `📚 Estudiar "${e.nombre}" — faltan ${e.d} días`
    ).join("\n");
}

function notificar(){
    if(notificacionesSilenciadas) return;

    let msg = mensaje();
    if(!msg) return;

    new Notification("📚 Estudio", { body: msg });
}

/* 3 HORARIOS */
function programar(){
    const horas=[9,15,21];

    horas.forEach(h=>{
        let now=new Date();
        let t=new Date();
        t.setHours(h,0,0,0);

        if(t<now) t.setDate(t.getDate()+1);

        setTimeout(()=>{
            notificar();
            programar();
        }, t-now);
    });
}

/* CONFIG */
document.getElementById("volumenInput").oninput = (e)=>{
    musica.volume = e.target.value;
};

function toggleSilencio(){
    notificacionesSilenciadas = !notificacionesSilenciadas;

    document.getElementById("silencioBtn").innerText =
    notificacionesSilenciadas ? "🔇 Activar" : "🔊 Silenciar";
}

/* MUSICA */
function toggleMusica(){
    musicaActiva = !musicaActiva;

    if(musicaActiva){
        musica.volume = document.getElementById("volumenInput").value;
        musica.play();
    } else {
        musica.pause();
    }
}

/* START */
mostrar();
programar();

if(Notification.permission !== "granted"){
    Notification.requestPermission();
}

</script>

</body>
</html>
