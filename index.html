<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Escolar Pro</title>

<style>
:root{
  --bg:#ffffff;
  --text:#0f172a;
}

*{box-sizing:border-box;font-family:system-ui;}

body{
  margin:0;
  background:var(--bg);
  transition:.3s;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#f1f5f9;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:10px;
}

/* CALENDAR */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  background:#111827;
  color:white;
  min-height:80px;
  border-radius:10px;
  padding:6px;
  cursor:pointer;
}

.badge{
  display:block;
  font-size:10px;
  margin-top:3px;
  background:#1f2937;
  padding:2px 4px;
  border-radius:6px;
}

/* TASK LIST */
#taskList{
  margin-top:15px;
}

.task{
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  display:flex;
  justify-content:space-between;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#0f172a;
  color:white;
  padding:15px;
  transition:.3s;
}

.sidebar.open{left:0;}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{display:flex;}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  width:300px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
}

/* SAVE BUTTON PRO */
.save-btn{
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  border: none;
  padding: 12px 22px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  min-width: 140px;
  box-shadow: 0 6px 15px rgba(37,99,235,0.35);
  transition: all 0.2s ease;
}

/* SWITCH MODERNO */
.switch{
  position:relative;
  display:inline-block;
  width:50px;
  height:28px;
}

.switch input{
  opacity:0;
  width:0;
  height:0;
}

.slider{
  position:absolute;
  cursor:pointer;
  top:0; left:0; right:0; bottom:0;
  background:#94a3b8;
  transition:.3s;
  border-radius:34px;
}

.slider:before{
  position:absolute;
  content:"";
  height:20px;
  width:20px;
  left:4px;
  bottom:4px;
  background:white;
  transition:.3s;
  border-radius:50%;
}

.switch input:checked + .slider{
  background:#22c55e;
}

.switch input:checked + .slider:before{
  transform:translateX(22px);
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <button onclick="toggleMenu()">☰</button>
  <button onclick="openSettings()">⚙️</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="menu">

  <button onclick="closeMenu()">✕ cerrar</button>

  <h3>🔊 Alarmas</h3>

  <label class="switch">
    <input type="checkbox" id="muteToggle" onchange="toggleMute()">
    <span class="slider"></span>
  </label>

  <div style="font-size:12px;opacity:.7;margin-top:5px;">
    ON = activadas / OFF = silenciadas
  </div>

  <h3 style="margin-top:15px;">🌗 Fondo calendario</h3>
  <input type="range" min="0.5" max="1.2" step="0.1" onchange="setBg(this.value)">

  <h3>📅 Brillo calendario</h3>
  <input type="range" min="0.5" max="1" step="0.1" onchange="setCal(this.value)">
</div>

<!-- MAIN -->
<div class="container">

  <div class="header">
    <button onclick="prev()">◀</button>
    <h2 id="title"></h2>
    <button onclick="next()">▶</button>
  </div>

  <div class="grid" id="cal"></div>

  <div id="taskList"></div>

</div>

<!-- MODAL TASK -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Nueva tarea</h3>
    <input id="name">
    <button onclick="save()">Guardar</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="modal" id="settings">
  <div class="box">
    <h3>Ajustes</h3>

    <label>Días antes de aviso</label>
    <select id="days">
      <option value="1">1 día</option>
      <option value="3">3 días</option>
      <option value="7">7 días</option>
    </select>

    <div style="display:flex;justify-content:center;margin-top:15px;">
      <button class="save-btn" onclick="saveSettings()">Guardar</button>
    </div>

  </div>
</div>

<script>

/* DATA */
let eventos = JSON.parse(localStorage.getItem("e")||"[]");
let settings = JSON.parse(localStorage.getItem("s")||"{days:1}");
let muted = JSON.parse(localStorage.getItem("muted")||"false");

let date = new Date();
let selected = null;

/* INIT SWITCH */
window.addEventListener("load", ()=>{
  document.getElementById("muteToggle").checked = !muted;
});

/* RENDER */
function render(){

  const cal=document.getElementById("cal");
  cal.innerHTML="";

  const y=date.getFullYear();
  const m=date.getMonth();

  document.getElementById("title").innerText=
  date.toLocaleString("es",{month:"long",year:"numeric"});

  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1;d<=days;d++){

    let f=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let ev=eventos.filter(e=>e.fecha===f);

    let html=`<strong>${d}</strong>`;

    ev.forEach(e=>{
      html+=`<span class="badge">${e.nombre}</span>`;
    });

    cal.innerHTML+=`
      <div class="day" onclick="openTask('${f}')">
        ${html}
      </div>`;
  }

  renderList();
}

/* LIST */
function renderList(){

  const list=document.getElementById("taskList");
  list.innerHTML="";

  eventos.forEach((e,i)=>{
    list.innerHTML+=`
      <div class="task">
        <div>
          <b>${e.nombre}</b>
          <div>${e.fecha}</div>
        </div>
        <button onclick="del(${i})">✕</button>
      </div>`;
  });

}

/* TASK */
function openTask(f){
  selected=f;
  document.getElementById("modal").classList.add("active");
}

function save(){
  let n=document.getElementById("name").value;

  eventos.push({nombre:n,fecha:selected});
  localStorage.setItem("e",JSON.stringify(eventos));

  document.getElementById("modal").classList.remove("active");

  render();
}

/* DELETE */
function del(i){
  eventos.splice(i,1);
  localStorage.setItem("e",JSON.stringify(eventos));
  render();
}

/* MONTH */
function next(){date.setMonth(date.getMonth()+1);render();}
function prev(){date.setMonth(date.getMonth()-1);render();}

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function closeMenu(){
  document.getElementById("menu").classList.remove("open");
}

/* SETTINGS */
function openSettings(){
  document.getElementById("settings").classList.add("active");
}

function saveSettings(){
  settings.days=document.getElementById("days").value;
  localStorage.setItem("s",JSON.stringify(settings));
  document.getElementById("settings").classList.remove("active");
}

/* SWITCH LOGIC */
function toggleMute(){
  muted = !document.getElementById("muteToggle").checked;
  localStorage.setItem("muted",JSON.stringify(muted));
}

/* SLIDERS */
function setBg(v){
  document.querySelectorAll(".day").forEach(d=>{
    d.style.background=`rgba(17,24,39,${v})`;
  });
}

function setCal(v){
  document.querySelectorAll(".day").forEach(d=>{
    d.style.opacity=v;
  });
}

render();

</script>

</body>
</html>
