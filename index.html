<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Dark</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:white;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111827;
}

/* MENU */
.menu{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#0f172a;
  padding:15px;
  transition:.3s;
  z-index:1000;
}

.menu.open{left:0;}

.menu button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* MAIN */
.container{
  max-width:900px;
  margin:auto;
  padding:12px;
}

/* CALENDAR */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  background:#111827;
  min-height:70px;
  border-radius:10px;
  padding:6px;
  cursor:pointer;
  border:1px solid #1f2937;
}

.badge{
  font-size:10px;
  display:block;
  margin-top:3px;
  background:#1f2937;
  padding:2px 4px;
  border-radius:6px;
}

/* LIST */
.task{
  background:#111827;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{display:flex;}

.box{
  background:#111827;
  padding:15px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  background:#0b1220;
  color:white;
}

.btn{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <button onclick="toggleMenu()">☰</button>
  <div>📅 Calendario</div>
</div>

<!-- MENU -->
<div class="menu" id="menu">

  <button onclick="alert('Inicio')">🏠 Iniciar</button>
  <button onclick="showTasks()">📋 Tareas</button>
  <button onclick="closeMenu()">❌ Cerrar</button>

</div>

<!-- MAIN -->
<div class="container">

  <h2 id="title"></h2>

  <div class="grid" id="cal"></div>

  <h3>📋 Tareas</h3>
  <div id="list"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Nueva tarea</h3>
    <input id="name" placeholder="Nombre">
    <button class="btn" onclick="save()">Guardar</button>
  </div>
</div>

<script>

let eventos = JSON.parse(localStorage.getItem("e")||"[]");
let date = new Date();
let selected = null;

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function closeMenu(){
  document.getElementById("menu").classList.remove("open");
}

/* CALENDAR */
function render(){

  const cal = document.getElementById("cal");
  cal.innerHTML="";

  let y=date.getFullYear();
  let m=date.getMonth();

  document.getElementById("title").innerText =
  date.toLocaleString("es",{month:"long",year:"numeric"});

  let first = new Date(y,m,1).getDay();
  let days = new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1; d<=days; d++){

    let f = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let ev = eventos.filter(e=>e.fecha===f);

    let html = `<strong>${d}</strong>`;

    ev.forEach(e=>{
      html += `<span class="badge">${e.nombre}</span>`;
    });

    cal.innerHTML += `
      <div class="day" onclick="openTask('${f}')">
        ${html}
      </div>`;
  }

  renderList();
}

/* LIST */
function renderList(){

  let list = document.getElementById("list");
  list.innerHTML="";

  eventos.forEach((e,i)=>{
    list.innerHTML += `
      <div class="task">
        <div>
          <b>${e.nombre}</b><br>
          <small>${e.fecha}</small>
        </div>
        <button onclick="del(${i})">✕</button>
      </div>`;
  });
}

/* TASK */
function openTask(f){
  selected=f;
  document.getElementById("modal").classList.add("active");
}

function save(){
  let n=document.getElementById("name").value;
  if(!n||!selected) return;

  eventos.push({nombre:n,fecha:selected});

  localStorage.setItem("e",JSON.stringify(eventos));

  document.getElementById("modal").classList.remove("active");

  render();
}

/* DELETE */
function del(i){
  eventos.splice(i,1);
  localStorage.setItem("e",JSON.stringify(eventos));
  render();
}

/* EXTRA */
function showTasks(){
  alert("Baja hasta la lista de tareas ↓");
}

/* INIT */
window.addEventListener("DOMContentLoaded",render);

</script>

</body>
</html>
