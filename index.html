<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Escolar Pro</title>

<style>
:root{
  --bg:#ffffff;
  --card:#111827;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#2563eb;
}

*{box-sizing:border-box;font-family:system-ui;}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#f1f5f9;
  position:sticky;
  top:0;
}

.topbar button{
  background:none;
  border:none;
  font-size:20px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:10px;
}

/* CALENDAR */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  background:#111827;
  color:white;
  min-height:85px;
  border-radius:10px;
  padding:6px;
  cursor:pointer;
  transition:.2s;
}

.day:hover{
  outline:2px solid var(--primary);
}

.badge{
  display:block;
  font-size:10px;
  margin-top:3px;
  padding:2px 4px;
  border-radius:6px;
  background:#1f2937;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#0f172a;
  color:white;
  padding:15px;
  transition:.3s;
}

.sidebar.open{left:0;}

.sidebar button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{display:flex;}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  width:300px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
}

/* TASK LIST */
.task{
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <button onclick="toggleSidebar()">☰</button>
  <div>
    <button onclick="openAlarms()">⏰</button>
    <button onclick="openSettings()">⚙️</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menú</h3>

  <button onclick="toggleMute()">🔇 ON/OFF sonido</button>

  <h4>🌗 Fondo</h4>
  <input type="range" min="0.7" max="1.2" step="0.1" onchange="setTheme(this.value)">

  <h4>📅 Brillo calendario</h4>
  <input type="range" min="0.5" max="1" step="0.1" onchange="setCal(this.value)">

</div>

<!-- MAIN -->
<div class="container">

  <div class="header">
    <button onclick="prevMonth()">◀</button>
    <h2 id="title"></h2>
    <button onclick="nextMonth()">▶</button>
  </div>

  <div class="grid" id="calendar"></div>

  <div id="tasks"></div>

</div>

<!-- MODAL TASK -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Nueva tarea</h3>
    <input id="name" placeholder="Nombre">
    <button onclick="saveTask()">Guardar</button>
  </div>
</div>

<script>

/* DATA */
let eventos = JSON.parse(localStorage.getItem("eventos")||"[]");
let alarmas = JSON.parse(localStorage.getItem("alarmas")||"[]");

let date=new Date();
let selected=null;
let muted=false;

/* RENDER */
function render(){

  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  const y=date.getFullYear();
  const m=date.getMonth();

  document.getElementById("title").innerText =
  date.toLocaleString("es",{month:"long",year:"numeric"});

  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1;d<=days;d++){

    let f=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let ev=eventos.filter(e=>e.fecha===f);

    let html=`<strong>${d}</strong>`;

    ev.forEach(e=>{
      html+=`<span class="badge">${e.nombre}</span>`;
    });

    cal.innerHTML+=`
      <div class="day" onclick="create('${f}')">
        ${html}
      </div>`;
  }
}

/* CREATE */
function create(f){
  selected=f;
  document.getElementById("modal").classList.add("active");
}

/* SAVE */
function saveTask(){
  let name=document.getElementById("name").value;

  eventos.push({nombre:name,fecha:selected});
  localStorage.setItem("eventos",JSON.stringify(eventos));

  document.getElementById("modal").classList.remove("active");

  render();
}

/* MONTH */
function nextMonth(){date.setMonth(date.getMonth()+1);render();}
function prevMonth(){date.setMonth(date.getMonth()-1);render();}

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

/* THEME */
function setTheme(v){
  document.body.style.filter=`brightness(${v})`;
}

function setCal(v){
  document.querySelectorAll(".day")
  .forEach(d=>d.style.opacity=v);
}

/* SOUND */
function toggleMute(){
  muted=!muted;
}

/* NOTIFY */
function notify(txt){
  if(!muted && "Notification" in window &&
     Notification.permission==="granted"){
    new Notification("📚 Calendario",{body:txt});
  }
}

/* AUTO CHECK */
setInterval(()=>{

  const now=new Date();
  const h=now.getHours();
  const m=String(now.getMinutes()).padStart(2,'0');
  const time=`${h}:${m}`;

  alarmas.forEach(a=>{
    if(a.hora===time) notify(a.nombre);
  });

  if(h===9 && m==="00") notify("📚 9 AM tareas");
  if(h===21 && m==="00") notify("🌙 9 PM repaso");

},60000);

/* ALARMAS */
function openAlarms(){

  const h=prompt("Hora HH:MM");
  const n=prompt("Nombre alarma");

  if(!h||!n) return;

  alarmas.push({hora:h,nombre:n});

  localStorage.setItem("alarmas",JSON.stringify(alarmas));

}

/* SETTINGS */
function openSettings(){
  alert("Usa el menú lateral para ajustes");
}

/* INIT */
if("Notification" in window){
  Notification.requestPermission();
}

render();

</script>

</body>
</html>
