
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Pro</title>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#0f172a;
  --primary:#2563eb;
  --red:#ef4444;
  --yellow:#f59e0b;
  --green:#22c55e;
}

*{box-sizing:border-box;font-family:system-ui;}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:white;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

/* BUTTONS */
.btn{
  border:none;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.btn-primary{
  background:var(--primary);
  color:white;
}

/* LAYOUT */
.container{
  max-width:900px;
  margin:auto;
  padding:12px;
}

/* CALENDAR */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  background:#111827;
  color:white;
  min-height:70px;
  border-radius:10px;
  padding:6px;
  cursor:pointer;
  position:relative;
}

.badge{
  font-size:10px;
  display:block;
  margin-top:3px;
  background:rgba(255,255,255,.1);
  padding:2px 4px;
  border-radius:6px;
}

/* COLORS */
.rojo{border:2px solid var(--red);}
.amarillo{border:2px solid var(--yellow);}
.verde{border:2px solid var(--green);}

/* LIST */
.task{
  background:white;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{display:flex;}

.box{
  background:white;
  padding:15px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
}

</style>
</head>

<body>

<div class="topbar">
  <button class="btn" onclick="prev()">◀</button>

  <button class="btn btn-primary" onclick="openSettings()">⚙ Ajustes</button>

  <button class="btn" onclick="next()">▶</button>
</div>

<div class="container">

  <h2 id="title"></h2>

  <div class="grid" id="cal"></div>

  <h3>📋 Tareas</h3>
  <div id="list"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Nueva tarea</h3>
    <input id="name" placeholder="Nombre">
    <input id="time" type="time">
    <button class="btn btn-primary" onclick="save()">Guardar</button>
  </div>
</div>

<script>

let eventos = JSON.parse(localStorage.getItem("e")||"[]");
let date = new Date();
let selected = null;

/* SAFE RENDER */
function render(){
try{

  const cal = document.getElementById("cal");
  cal.innerHTML="";

  let y = date.getFullYear();
  let m = date.getMonth();

  document.getElementById("title").innerText =
  date.toLocaleString("es",{month:"long",year:"numeric"});

  let first = new Date(y,m,1).getDay();
  let days = new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1; d<=days; d++){

    let f = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let ev = eventos.filter(e=>e.fecha===f);

    let clase = getColor(f);

    let html = `<strong>${d}</strong>`;

    ev.forEach(e=>{
      html += `<span class="badge">${e.nombre}</span>`;
    });

    cal.innerHTML += `
      <div class="day ${clase}" onclick="openTask('${f}')">
        ${html}
      </div>`;
  }

  renderList();

}catch(e){
  console.log("Render error",e);
}
}

/* COLOR SYSTEM */
function getColor(fecha){
  let ev = eventos.filter(e=>e.fecha===fecha);
  if(ev.length===0) return "";
  return "rojo"; // simplificado (puedes extenderlo)
}

/* LIST */
function renderList(){
  let list = document.getElementById("list");
  list.innerHTML="";

  eventos.forEach((e,i)=>{
    list.innerHTML += `
      <div class="task">
        <div>
          <b>${e.nombre}</b><br>
          <small>${e.fecha} ${e.hora||""}</small>
        </div>
        <button onclick="del(${i})">✕</button>
      </div>`;
  });
}

/* OPEN */
function openTask(f){
  selected=f;
  document.getElementById("modal").classList.add("active");
}

/* SAVE */
function save(){

  let n=document.getElementById("name").value;
  let t=document.getElementById("time").value;

  if(!n||!selected) return;

  eventos.push({
    nombre:n,
    fecha:selected,
    hora:t
  });

  localStorage.setItem("e",JSON.stringify(eventos));

  document.getElementById("modal").classList.remove("active");

  render();
}

/* DELETE */
function del(i){
  eventos.splice(i,1);
  localStorage.setItem("e",JSON.stringify(eventos));
  render();
}

/* MONTH */
function next(){date.setMonth(date.getMonth()+1);render();}
function prev(){date.setMonth(date.getMonth()-1);render();}

/* START SAFE */
window.addEventListener("DOMContentLoaded", render);

</script>

</body>
</html>
