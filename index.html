
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Escolar</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f2f4f8;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#fff;
    padding:10px;
}

.menu{
    font-size:25px;
    cursor:pointer;
}

.sidebar{
    position:fixed;
    left:-250px;
    top:0;
    width:250px;
    height:100%;
    background:#fff;
    padding:10px;
    transition:0.3s;
}

.sidebar.open{
    left:0;
}

input, button{
    width:100%;
    padding:10px;
    margin-top:8px;
}

.evento{
    background:#fff;
    margin:10px;
    padding:10px;
    border-radius:10px;
    position:relative;
}

.rojo{border-left:5px solid red;}
.amarillo{border-left:5px solid orange;}
.verde{border-left:5px solid green;}

button.delete{
    position:absolute;
    right:10px;
    top:10px;
    width:auto;
}

button.edit{
    position:absolute;
    right:60px;
    top:10px;
    width:auto;
}
</style>
</head>

<body>

<header>
    <div class="menu" onclick="toggleMenu()">☰</div>
    <h3>📚 Calendario</h3>
</header>

<div class="sidebar" id="menu">

    <input id="buscador" placeholder="🔍 Buscar materia" oninput="buscarMateria()">

    <hr>

    <button onclick="filtro='todos';mostrar()">📚 Todas</button>
    <button onclick="filtro='tarea';mostrar()">📝 Tareas</button>
    <button onclick="filtro='examen';mostrar()">📖 Exámenes</button>
    <button onclick="filtro='tp';mostrar()">📋 TP</button>
    <button onclick="filtro='expo';mostrar()">🎤 Exposiciones</button>

    <hr>

    <div id="materiasList"></div>
</div>

<form id="form">
    <input id="nombre" placeholder="Nombre">
    <input id="materia" placeholder="Materia">
    <input type="date" id="fecha">

    <select id="tipo">
        <option value="tarea">Tarea</option>
        <option value="examen">Examen</option>
        <option value="tp">Trabajo práctico</option>
        <option value="expo">Exposición</option>
    </select>

    <button>Agregar</button>
</form>

<div id="lista"></div>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];
let filtro = "todos";
let sonido = true;

function guardar(){
    localStorage.setItem("eventos", JSON.stringify(eventos));
}

function diasFaltan(fecha){
    const hoy = new Date();
    hoy.setHours(0,0,0,0);

    const f = new Date(fecha);
    f.setHours(0,0,0,0);

    return Math.ceil((f-hoy)/86400000);
}

function color(d){
    if(d<=5) return "rojo";
    if(d<=10) return "amarillo";
    return "verde";
}

function mostrar(){

    eventos.sort((a,b)=>diasFaltan(a.fecha)-diasFaltan(b.fecha));

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    eventos.forEach((e,i)=>{

        let d = diasFaltan(e.fecha);

        if(filtro!="todos" && filtro!=e.tipo) return;

        let texto = d==0 ? "🔥 ES HOY" : `⏳ ${d} días`;

        lista.innerHTML += `
        <div class="evento ${color(d)}">
            <b>${e.nombre}</b><br>
            📚 ${e.materia}<br>
            📅 ${e.fecha}<br>
            ${texto}

            <button class="edit" onclick="editar(${i})">✏️</button>
            <button class="delete" onclick="eliminar(${i})">🗑️</button>
        </div>`;
    });

    mostrarMaterias();
    notificar();
    guardar();
}

function agregar(e){
    e.preventDefault();

    eventos.push({
        nombre:nombre.value,
        materia:materia.value,
        fecha:fecha.value,
        tipo:tipo.value,
        temas:"",
        plan:""
    });

    form.reset();
    mostrar();
}

function eliminar(i){
    eventos.splice(i,1);
    mostrar();
}

function editar(i){

    let n = prompt("Nombre:", eventos[i].nombre);
    let f = prompt("Fecha:", eventos[i].fecha);

    if(n) eventos[i].nombre = n;
    if(f) eventos[i].fecha = f;

    mostrar();
}

function toggleMenu(){
    document.getElementById("menu").classList.toggle("open");
}

function mostrarMaterias(){

    let div = document.getElementById("materiasList");

    let mats = [...new Set(eventos.map(e=>e.materia))];

    div.innerHTML = "";

    mats.forEach(m=>{
        div.innerHTML += `<button onclick="verMateria('${m}')">${m}</button>`;
    });
}

function buscarMateria(){

    let q = buscador.value.toLowerCase();

    let mats = [...new Set(eventos.map(e=>e.materia))];

    let div = document.getElementById("materiasList");

    div.innerHTML = "";

    mats.filter(m=>m.toLowerCase().includes(q))
        .forEach(m=>{
            div.innerHTML += `<button onclick="verMateria('${m}')">${m}</button>`;
        });
}

function verMateria(m){

    let lista = eventos.filter(e=>e.materia==m);

    let txt = "📚 "+m+"\n\n";

    lista.forEach(e=>{
        txt += `
📖 ${e.nombre}
📅 ${e.fecha}
🧠 Plan: ${e.plan||"vacío"}
📖 Temas: ${e.temas||"vacío"}

------------------
`;
    });

    alert(txt);
}

function notificar(){

    if(!sonido) return;
    if(Notification.permission!=="granted") return;

    let urgentes = eventos.filter(e=>diasFaltan(e.fecha)<=5);

    if(urgentes.length==0) return;

    let mats = [...new Set(urgentes.map(e=>e.materia))];

    new Notification("📚 Estudio pendiente",{
        body:mats.join(", ")
    });
}

form.addEventListener("submit",agregar);

mostrar();

if(Notification.permission!=="granted"){
    Notification.requestPermission();
}

</script>

</body>
</html>
