


<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Escolar Pro</title>

<style>
body{
    font-family: Arial;
    background:#f2f4f8;
    margin:0;
    padding:15px;
}

/* SPLASH */
#splash{
    position:fixed;
    inset:0;
    background:#f2f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation:fade 2s forwards;
    animation-delay:1.5s;
}
@keyframes fade{
    to{opacity:0;visibility:hidden;}
}

/* TOPBAR */
.topbar{
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    margin-top:50px;
}

.topbar h1{
    margin:0;
    font-size:22px;
}

.menu-btn{
    position:absolute;
    left:0;
    font-size:24px;
    border:none;
    background:white;
    padding:8px 12px;
    border-radius:8px;
}

/* FORM */
form{
    background:white;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
}

input,button{
    width:100%;
    padding:10px;
    margin-top:6px;
    box-sizing:border-box;
}

/* EVENTOS */
.evento{
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    position:relative;
    font-weight:bold;
}

.rojo{background:#ffd6d6;}
.amarillo{background:#fff4c2;}
.verde{background:#d6ffd6;}

.edit{
    position:absolute;
    right:45px;
    top:10px;
    background:#eee;
    border:none;
    padding:5px;
    border-radius:6px;
    cursor:pointer;
}

.delete{
    position:absolute;
    right:10px;
    top:10px;
    background:#ffdddd;
    border:none;
    padding:5px;
    border-radius:6px;
    cursor:pointer;
}

/* MENU */
.menu{
    position:fixed;
    top:0;
    left:-260px;
    width:240px;
    height:100%;
    background:white;
    box-shadow:2px 0 10px rgba(0,0,0,0.3);
    padding:15px;
    transition:0.3s;
    z-index:3000;
}

.menu.open{left:0;}

#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
    z-index:2500;
}
#overlay.show{display:block;}

/* CALENDARIO */
#calendario{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
    margin-top:20px;
}

.dia{
    background:white;
    min-height:50px;
    padding:6px;
    font-size:12px;
    border-radius:6px;
}

.evento-mini{
    font-size:10px;
    background:#ddd;
    margin-top:2px;
    border-radius:4px;
    padding:2px;
}

/* VOL */
input[type=range]{
    width:100%;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <h1>📚 Calendario Escolar</h1>
</div>

<!-- TOPBAR -->
<div class="topbar">
    <button class="menu-btn" id="menuBtn">☰</button>
    <h1>📚 Calendario Escolar</h1>
</div>

<!-- MENU -->
<div id="overlay"></div>

<div class="menu" id="menu">

    <h3>📂 Filtros</h3>
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('rojo')">🔴 Urgentes</button>
    <button onclick="filtrar('amarillo')">🟡 Próximos</button>
    <button onclick="filtrar('verde')">🟢 Lejanos</button>

    <hr>

    <h3>🎵 Música</h3>
    <button onclick="toggleMusica()">▶ Música</button>

    <label>Volumen</label>
    <input type="range" id="volumen" min="0" max="1" step="0.1">

</div>

<!-- FORM -->
<form id="form">
    <input id="nombre" placeholder="Tarea o examen" required>
    <input type="date" id="fecha" required>
    <button>Agregar</button>
</form>

<div id="lista"></div>

<h3>📅 Calendario</h3>
<div id="calendario"></div>

<audio id="musica" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_7c8b1c1c7d.mp3">
</audio>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];
let filtro = "todos";

const menu = document.getElementById("menu");
const overlay = document.getElementById("overlay");
const musica = document.getElementById("musica");

/* MENU */
document.getElementById("menuBtn").onclick = ()=>{
    menu.classList.add("open");
    overlay.classList.add("show");
};

overlay.onclick = cerrarMenu;

function cerrarMenu(){
    menu.classList.remove("open");
    overlay.classList.remove("show");
}

/* FILTRO */
function filtrar(f){
    filtro = f;
    mostrar();
    cerrarMenu();
}

/* DIAS */
function diasFaltan(f){
    const hoy = new Date();
    hoy.setHours(0,0,0,0);
    const e = new Date(f);
    e.setHours(0,0,0,0);
    return Math.ceil((e-hoy)/(1000*60*60*24));
}

function color(d){
    if(d<=5) return "rojo";
    if(d<=10) return "amarillo";
    return "verde";
}

/* MOSTRAR */
function mostrar(){

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    eventos.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

    eventos.forEach((e,i)=>{

        let d = diasFaltan(e.fecha);
        let c = color(d);

        if(filtro!=="todos" && filtro!==c) return;

        lista.innerHTML += `
        <div class="evento ${c}">
            ${e.nombre}<br>
            📅 ${e.fecha}<br>
            ⏳ ${d} días

            <button class="edit" onclick="editar(${i})">✏️</button>
            <button class="delete" onclick="eliminar(${i})">❌</button>
        </div>`;
    });

    guardar();
    renderCalendario();
}

/* EDITAR */
function editar(i){
    let n = prompt("Editar:", eventos[i].nombre);
    if(n) eventos[i].nombre = n;
    mostrar();
}

/* ELIMINAR */
function eliminar(i){
    eventos.splice(i,1);
    mostrar();
}

/* GUARDAR */
function guardar(){
    localStorage.setItem("eventos", JSON.stringify(eventos));
}

/* FORM */
document.getElementById("form").addEventListener("submit",e=>{
    e.preventDefault();
    eventos.push({
        nombre:nombre.value,
        fecha:fecha.value
    });
    nombre.value="";
    fecha.value="";
    mostrar();
});

/* CALENDARIO */
function renderCalendario(){

    const cont = document.getElementById("calendario");
    cont.innerHTML = "";

    const hoy = new Date();
    const mes = hoy.getMonth();
    const año = hoy.getFullYear();

    const primer = new Date(año,mes,1).getDay();
    const dias = new Date(año,mes+1,0).getDate();

    for(let i=0;i<primer;i++){
        cont.innerHTML += `<div class="dia"></div>`;
    }

    for(let d=1;d<=dias;d++){

        let fecha = `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        let ev = eventos.filter(e=>e.fecha===fecha);

        let html = `<strong>${d}</strong>`;

        ev.forEach(e=>{
            html += `<div class="evento-mini">${e.nombre}</div>`;
        });

        cont.innerHTML += `<div class="dia">${html}</div>`;
    }
}

/* MUSICA */
document.getElementById("volumen").addEventListener("input",(e)=>{
    musica.volume = e.target.value;
});

function toggleMusica(){
    musica.volume = 0.3;
    musica.play();
}

/* AUTOPLAY SAFE */
document.addEventListener("click",()=>{
    musica.volume = 0.3;
    musica.play();
},{once:true});

/* INIT */
mostrar();

</script>

</body>
</html>
