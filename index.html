<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Escolar Pro</title>

<style>
body{
    margin:0;
    font-family: "Segoe UI", Arial;
    background: linear-gradient(135deg,#eef2f7,#dfe7f3);
}

/* APP */
.app{
    max-width:520px;
    margin:auto;
    padding:16px;
}

/* TITULO */
h1{
    text-align:center;
    margin-bottom:10px;
}

/* INPUTS */
input,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:14px;
}

button{
    background:#4a90e2;
    color:white;
    border:none;
    font-weight:bold;
}

/* CONTADOR */
#contador{
    text-align:center;
    font-weight:bold;
    margin:10px 0;
}

/* BUSCADOR */
#buscar{
    margin-bottom:10px;
}

/* EVENTOS */
.evento{
    margin-top:10px;
    padding:12px;
    border-radius:14px;
    position:relative;
    font-weight:bold;
    animation: aparecer 0.25s ease;
    transition:0.2s;
}

.evento:hover{
    transform:scale(1.02);
}

@keyframes aparecer{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* COLORES PRO */
.rojo{
    background:#ffd6d6;
    border-left:6px solid #ff3b30;
}

.amarillo{
    background:#fff4c2;
    border-left:6px solid #ffb300;
}

.verde{
    background:#d6ffd6;
    border-left:6px solid #34c759;
}

/* BORRAR */
.delete{
    position:absolute;
    right:10px;
    top:10px;
    background:#ff4d4d;
    border:none;
    color:white;
    border-radius:8px;
    width:auto;
    padding:5px 8px;
}

/* CALENDARIO */
#calendario{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
    margin-top:20px;
}

.dia{
    background:white;
    padding:8px;
    border-radius:10px;
    min-height:55px;
    font-size:12px;
}

.hoy{
    border:2px solid #4a90e2;
}

.evento-mini{
    font-size:10px;
    margin-top:2px;
    background:#eee;
    border-radius:4px;
    padding:2px;
}

/* BOTON EXPORT */
#exportar{
    margin-top:10px;
    background:#34c759;
}
</style>
</head>

<body>

<div class="app">

<h1>📚 Calendario Escolar</h1>

<div id="contador"></div>

<input id="buscar" placeholder="🔍 Buscar eventos...">

<form id="form">
    <input id="nombre" placeholder="Tarea o examen" required>
    <input type="date" id="fecha" required>
    <button>Agregar</button>
</form>

<button id="exportar">⬇ Exportar datos</button>

<div id="lista"></div>

<h2>📅 Calendario</h2>
<div id="calendario"></div>

</div>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

const nombre = document.getElementById("nombre");
const fecha = document.getElementById("fecha");
const buscar = document.getElementById("buscar");

/* GUARDAR */
function guardar(){
    localStorage.setItem("eventos", JSON.stringify(eventos));
}

/* DIAS */
function diasFaltan(f){
    const hoy = new Date();
    hoy.setHours(0,0,0,0);

    const e = new Date(f + "T00:00:00");
    return Math.ceil((e - hoy)/86400000);
}

/* COLORES INTELIGENTES */
function color(d){
    if(d <= 5) return "rojo";
    if(d <= 10) return "amarillo";
    return "verde";
}

/* NOTIFICACIÓN */
function notificar(texto){
    if(Notification.permission === "granted"){
        new Notification("📚 Calendario", {body:texto});
    }
}

/* MOSTRAR */
function mostrar(filtro=""){

    let html = "";

    eventos.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

    eventos.forEach((e,i)=>{

        if(!e.nombre.toLowerCase().includes(filtro)) return;

        let d = diasFaltan(e.fecha);
        let c = color(d);

        let texto;

        if(d <= 0){
            texto = "🔥 HOY";
        }else if(d <= 5){
            texto = `🚨 ${d} días`;
        }else if(d <= 10){
            texto = `⚠️ ${d} días`;
        }else{
            texto = `🟢 ${d} días`;
        }

        if(d === 0) notificar(e.nombre);

        html += `
        <div class="evento ${c}">
            ${e.nombre}<br>
            📅 ${e.fecha}<br>
            ${texto}
            <button class="delete" onclick="eliminar(${i})">X</button>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;

    document.getElementById("contador").innerHTML =
        `📊 ${eventos.length} tareas`;

    guardar();
    renderCalendario();
}

/* ELIMINAR */
function eliminar(i){
    eventos.splice(i,1);
    mostrar(buscar.value.toLowerCase());
}

/* AGREGAR */
document.getElementById("form").addEventListener("submit",e=>{
    e.preventDefault();

    eventos.push({
        nombre:nombre.value,
        fecha:fecha.value
    });

    nombre.value="";
    fecha.value="";

    mostrar();
});

/* BUSCAR */
buscar.addEventListener("input",()=>{
    mostrar(buscar.value.toLowerCase());
});

/* EXPORTAR */
document.getElementById("exportar").onclick = ()=>{
    const blob = new Blob(
        [JSON.stringify(eventos,null,2)],
        {type:"application/json"}
    );

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "eventos.json";
    a.click();
};

/* CALENDARIO */
function renderCalendario(){

    const cont = document.getElementById("calendario");
    cont.innerHTML = "";

    const hoy = new Date();
    const mes = hoy.getMonth();
    const año = hoy.getFullYear();

    const primer = new Date(año,mes,1).getDay();
    const diasMes = new Date(año,mes+1,0).getDate();

    for(let i=0;i<primer;i++){
        cont.innerHTML += `<div class="dia"></div>`;
    }

    for(let d=1; d<=diasMes; d++){

        let fechaStr = `${año}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        let ev = eventos.filter(e=>e.fecha===fechaStr);

        let html = `<strong>${d}</strong>`;

        ev.forEach(e=>{
            html += `<div class="evento-mini">${e.nombre}</div>`;
        });

        let clase = (d === hoy.getDate()) ? "dia hoy" : "dia";

        cont.innerHTML += `<div class="${clase}">${html}</div>`;
    }
}

/* NOTIFICACIONES */
Notification.requestPermission();

/* INIT */
mostrar();

</script>

</body>
</html>
