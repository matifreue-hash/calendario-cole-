





<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendario Escolar Pro</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:linear-gradient(135deg,#eef2f7,#dfe7f3);
}

/* APP */
.app{
    max-width:520px;
    margin:auto;
    background:white;
    padding:16px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* INPUTS */
input,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    background:#4a90e2;
    color:white;
    border:none;
    font-weight:bold;
}

/* CONTADOR */
#contador{
    text-align:center;
    font-weight:bold;
    margin:10px 0;
}

/* EVENTOS */
.evento{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    animation: aparecer .2s ease;
    transition:0.2s;
}

.evento:hover{
    transform:scale(1.02);
}

@keyframes aparecer{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;}
}

/* COLORES NUEVOS */
.rojo{
    background:#ffd6d6;
    border-left:6px solid #ff3b30;
}

.amarillo{
    background:#fff4c2;
    border-left:6px solid #ffb300;
}

.verde{
    background:#d6ffd6;
    border-left:6px solid #34c759;
}
</style>
</head>

<body>

<div class="app">

<h1>📚 Calendario Escolar Pro</h1>

<div id="contador"></div>

<input id="buscar" placeholder="🔍 Buscar...">

<form id="form">
    <input id="nombre" placeholder="Tarea o examen" required>
    <input type="date" id="fecha" required>
    <button>Agregar</button>
</form>

<button onclick="exportar()">⬇ Exportar datos</button>

<div id="lista"></div>

</div>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];

const nombre = document.getElementById("nombre");
const fecha = document.getElementById("fecha");
const buscar = document.getElementById("buscar");

/* GUARDAR */
function guardar(){
    localStorage.setItem("eventos", JSON.stringify(eventos));
}

/* DIAS */
function diasFaltan(f){
    return Math.ceil((new Date(f) - new Date()) / 86400000);
}

/* 🎨 COLORES NUEVOS */
function color(d){

    if(d <= 0){
        return "rojo";
    }

    if(d >= 2 && d <= 5){
        return "rojo";
    }

    if(d >= 6 && d <= 10){
        return "amarillo";
    }

    return "verde";
}

/* 🔔 NOTIFICACIÓN */
function notificar(texto){
    if(Notification.permission === "granted"){
        new Notification("📚 Calendario", {
            body: texto
        });
    }
}

/* 📊 MOSTRAR */
function mostrar(filtro=""){

    let html = "";

    eventos.sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));

    eventos.forEach(e=>{

        if(!e.nombre.toLowerCase().includes(filtro)) return;

        let d = diasFaltan(e.fecha);
        let c = color(d);

        let texto;

        if(d <= 0){
            texto = "🔥 HOY / VENCIDO";
        }else if(d <= 5){
            texto = `🚨 MUY PRÓXIMO (${d} días)`;
        }else if(d <= 10){
            texto = `⚠️ Próximo (${d} días)`;
        }else{
            texto = `🟢 Lejano (${d} días)`;
        }

        if(d === 0) notificar(e.nombre);

        html += `
        <div class="evento ${c}">
            ${e.nombre}<br>
            📅 ${e.fecha}<br>
            ${texto}
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;

    document.getElementById("contador").innerHTML =
        `📊 ${eventos.length} tareas`;

    guardar();
}

/* ➕ AGREGAR */
form.onsubmit = (e)=>{
    e.preventDefault();

    eventos.push({
        nombre:nombre.value,
        fecha:fecha.value
    });

    nombre.value="";
    fecha.value="";

    mostrar();
}

/* 🔍 BUSCAR */
buscar.oninput = ()=>{
    mostrar(buscar.value.toLowerCase());
}

/* 📦 EXPORTAR */
function exportar(){
    let blob = new Blob(
        [JSON.stringify(eventos,null,2)],
        {type:"application/json"}
    );

    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "eventos.json";
    a.click();
}

/* 🔔 PERMISO NOTIFICACIONES */
Notification.requestPermission();

/* INIT */
mostrar();

</script>

</body>
</html>
