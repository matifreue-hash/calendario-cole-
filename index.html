<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Escolar Pro</title>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --muted:#94a3b8;
  --primary:#3b82f6;
  --danger:#ef4444;
  --warn:#f59e0b;
  --ok:#22c55e;
  --text:#e5e7eb;
}

*{box-sizing:border-box;font-family:system-ui;}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#0b1220;
  position:sticky;
  top:0;
}

.topbar button{
  background:none;
  border:none;
  color:white;
  font-size:20px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  max-width:900px;
  margin:auto;
  padding:12px;
}

/* CALENDAR HEADER */
.cal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
}

.cal-header h2{
  margin:0;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  background:#111827;
  min-height:80px;
  border-radius:10px;
  padding:6px;
  cursor:pointer;
}

.day:hover{
  outline:2px solid var(--primary);
}

.badge{
  font-size:10px;
  display:block;
  margin-top:3px;
  padding:2px 4px;
  border-radius:6px;
}

.red{background:#7f1d1d;}
.yellow{background:#78350f;}
.green{background:#14532d;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#0b1220;
  padding:15px;
  transition:0.3s;
}

.sidebar.open{
  left:0;
}

.sidebar h3{
  margin-top:0;
}

.sidebar button{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#111827;
  color:white;
  border:none;
  border-radius:8px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{
  display:flex;
}

.modal-box{
  background:#111827;
  padding:15px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <button onclick="toggleSidebar()">☰</button>
  <div>
    <button onclick="openAlarms()">⏰</button>
    <button onclick="openSettings()">⚙️</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menú</h3>
  <button onclick="closeSidebar()">Cerrar</button>
  <button>Inicio</button>
  <button>Alarmas</button>
  <button>Ajustes</button>
</div>

<div class="container">

  <!-- CALENDAR HEADER -->
  <div class="cal-header">
    <button onclick="prevMonth()">◀</button>
    <h2 id="monthTitle"></h2>
    <button onclick="nextMonth()">▶</button>
  </div>

  <!-- CALENDAR -->
  <div class="grid" id="calendar"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Nueva tarea</h3>
    <input id="taskName" placeholder="Nombre">
    <button onclick="saveTask()">Guardar</button>
  </div>
</div>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")||"[]");

let date = new Date();

function render(){

  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const year = date.getFullYear();
  const month = date.getMonth();

  document.getElementById("monthTitle").innerText =
    date.toLocaleString('es',{month:'long',year:'numeric'});

  const first = new Date(year,month,1).getDay();
  const days = new Date(year,month+1,0).getDate();

  for(let i=0;i<first;i++){
    cal.innerHTML += `<div></div>`;
  }

  for(let d=1;d<=days;d++){

    let f = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let ev = eventos.filter(e=>e.fecha===f);

    let html = `<strong>${d}</strong>`;

    ev.forEach(e=>{
      html += `<span class="badge">${e.nombre}</span>`;
    });

    cal.innerHTML += `
      <div class="day" onclick="create('${f}')">
        ${html}
      </div>`;
  }
}

function create(fecha){
  window.selectedDate = fecha;
  document.getElementById("modal").classList.add("active");
}

function saveTask(){
  let name = document.getElementById("taskName").value;

  eventos.push({
    nombre:name,
    fecha:window.selectedDate
  });

  localStorage.setItem("eventos",JSON.stringify(eventos));

  document.getElementById("modal").classList.remove("active");

  render();
}

/* MONTH NAV */
function nextMonth(){
  date.setMonth(date.getMonth()+1);
  render();
}

function prevMonth(){
  date.setMonth(date.getMonth()-1);
  render();
}

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
}

/* PLACEHOLDERS */
function openAlarms(){
  alert("Sistema de alarmas (siguiente paso)");
}

function openSettings(){
  alert("Ajustes (siguiente paso)");
}

render();

</script>

</body>
</html>
