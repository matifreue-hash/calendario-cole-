<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Pro</title>

<style>
body{font-family:Arial;margin:0;background:#f2f4f8}

header{
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.menu{font-size:24px;cursor:pointer}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#fff;
padding:10px;
transition:.3s;
overflow:auto;
}

.sidebar.open{left:0}

.page{
padding:10px;
}

.card{
background:#fff;
padding:10px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
}

.evento{
background:#fff;
margin:10px 0;
padding:10px;
border-radius:10px;
position:relative;
}

.rojo{border-left:5px solid red}
.amarillo{border-left:5px solid orange}
.verde{border-left:5px solid green}

button{
padding:8px;
margin-top:5px;
width:100%;
}

.smallBtn{
width:auto;
position:absolute;
top:10px;
}

.del{right:10px}
.edit{right:60px}

.hidden{display:none}
</style>
</head>

<body>

<header>
<div class="menu" onclick="toggleMenu()">☰</div>
<h3>📚 Calendario Pro</h3>
</header>

<!-- MENU -->
<div class="sidebar" id="menu">

<input id="search" placeholder="🔍 Buscar materia" oninput="renderMaterias()">

<hr>

<div id="materias"></div>

<hr>

<button onclick="show('home')">🏠 Inicio</button>
<button onclick="show('events')">📅 Eventos</button>

</div>

<!-- HOME -->
<div class="page" id="home">

<h3>⭐ Dashboard</h3>

<div id="stats"></div>

</div>

<!-- EVENTS -->
<div class="page hidden" id="events">

<h3>📅 Eventos</h3>

<div id="lista"></div>

</div>

<!-- MATERIA -->
<div class="page hidden" id="materiaPage">

<h3 id="materiaTitle"></h3>

<div id="materiaContent"></div>

</div>

<!-- FORM -->
<div class="page">

<h3>➕ Agregar</h3>

<input id="nombre" placeholder="Nombre">
<input id="materia" placeholder="Materia">
<input type="date" id="fecha">

<select id="tipo">
<option value="tarea">Tarea</option>
<option value="examen">Examen</option>
<option value="tp">TP</option>
<option value="expo">Exposición</option>
</select>

<button onclick="add()">Agregar</button>

</div>

<script>

let eventos = JSON.parse(localStorage.getItem("eventos")) || [];
let filtro = "todos";

// SAVE
function save(){
localStorage.setItem("eventos",JSON.stringify(eventos));
}

// DIAS
function dias(f){
let h=new Date();h.setHours(0,0,0,0);
let d=new Date(f);d.setHours(0,0,0,0);
return Math.ceil((d-h)/86400000);
}

// COLOR
function color(d){
if(d<=5)return"rojo";
if(d<=10)return"amarillo";
return"verde";
}

// NAV PAGES
function show(p){
home.classList.add("hidden");
events.classList.add("hidden");
materiaPage.classList.add("hidden");

if(p=="home")home.classList.remove("hidden");
if(p=="events")events.classList.remove("hidden");
}

// ADD
function add(){

eventos.push({
nombre:nombre.value,
materia:materia.value,
fecha:fecha.value,
tipo:tipo.value,
temas:"",
plan:""
});

nombre.value="";
materia.value="";
fecha.value="";

render();
}

// RENDER EVENTS
function render(){

eventos.sort((a,b)=>dias(a.fecha)-dias(b.fecha));

lista.innerHTML="";

let tareas = 0;
let examenes = 0;

eventos.forEach((e,i)=>{

if(e.tipo=="tarea")tareas++;
if(e.tipo=="examen")examenes++;

let d=dias(e.fecha);

lista.innerHTML+=`
<div class="evento ${color(d)}">

<b onclick="openMateria('${e.materia}')">${e.nombre}</b><br>
📚 ${e.materia}<br>
📅 ${e.fecha}<br>
${d==0?"🔥 ES HOY":"⏳ "+d+" días"}

<button class="smallBtn edit" onclick="edit(${i})">✏️</button>
<button class="smallBtn del" onclick="del(${i})">🗑️</button>

</div>`;
});

stats.innerHTML=`
📊 Total: ${eventos.length}<br>
📝 Tareas: ${tareas}<br>
📖 Exámenes: ${examenes}
`;

save();
renderMaterias();
}

// DELETE
function del(i){
eventos.splice(i,1);
render();
}

// EDIT
function edit(i){

let n=prompt("Nombre:",eventos[i].nombre);
let f=prompt("Fecha:",eventos[i].fecha);

if(n)eventos[i].nombre=n;
if(f)eventos[i].fecha=f;

render();
}

// MENU
function toggleMenu(){
menu.classList.toggle("open");
}

// MATERIAS LIST
function renderMaterias(){

let q=search.value.toLowerCase();

let mats=[...new Set(eventos.map(e=>e.materia))];

materias.innerHTML="";

mats
.filter(m=>m.toLowerCase().includes(q))
.forEach(m=>{
materias.innerHTML+=`
<div class="card" onclick="openMateria('${m}')">
📚 ${m}
</div>`;
});
}

// OPEN MATERIA (NIVEL PRO REAL)
function openMateria(m){

show("materiaPage");

materiaTitle.innerText="📚 "+m;

let list = eventos.filter(e=>e.materia===m);

materiaContent.innerHTML="";

list.forEach(e=>{

materiaContent.innerHTML+=`
<div class="card">

<b>${e.nombre}</b><br>
📅 ${e.fecha}<br>

🧠 Temas:<br>
${e.temas || "Sin temas"}<br><br>

📅 Plan de estudio:<br>
${e.plan || "Sin plan"}

</div>`;
});
}

// INIT
render();

</script>

</body>
</html>
