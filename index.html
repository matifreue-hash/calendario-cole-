<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Escolar Pro</title>

<style>
:root{
  --bg:#0b1220;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --primary:#3b82f6;
  --danger:#ef4444;
  --warn:#f59e0b;
  --ok:#22c55e;
}

*{box-sizing:border-box;font-family:system-ui;}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#0a0f1c;
  position:sticky;
  top:0;
}

.topbar button{
  background:none;
  border:none;
  color:white;
  font-size:20px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  max-width:900px;
  margin:auto;
  padding:10px;
}

/* MONTH NAV */
.monthbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  background:#111827;
  min-height:80px;
  border-radius:10px;
  padding:6px;
  cursor:pointer;
  transition:.2s;
}

.day:hover{
  outline:2px solid var(--primary);
}

.badge{
  display:block;
  font-size:10px;
  margin-top:3px;
  padding:2px 4px;
  border-radius:6px;
  background:#1f2937;
}

/* PRIORITY COLORS */
.red{background:#7f1d1d;}
.yellow{background:#78350f;}
.green{background:#14532d;}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#0a0f1c;
  padding:15px;
  transition:.3s;
}

.sidebar.open{left:0;}

.sidebar button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:white;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{display:flex;}

.box{
  background:#111827;
  padding:15px;
  border-radius:10px;
  width:300px;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}

/* LIST */
.list{
  margin-top:10px;
}

.task{
  background:#111827;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.small{
  font-size:12px;
  color:var(--muted);
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <button onclick="toggleSidebar()">☰</button>
  <div>
    <button onclick="openAlarms()">⏰</button>
    <button onclick="openSettings()">⚙️</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Menú</h3>
  <button onclick="toggleSidebar()">Cerrar</button>
  <button onclick="view='home';render()">Inicio</button>
  <button onclick="view='tasks';render()">Tareas</button>
</div>

<div class="container">

  <div class="monthbar">
    <button onclick="prevMonth()">◀</button>
    <h2 id="title"></h2>
    <button onclick="nextMonth()">▶</button>
  </div>

  <div id="calendar" class="grid"></div>

  <div id="taskList" class="list"></div>

</div>

<!-- MODAL TASK -->
<div class="modal" id="modal">
  <div class="box">
    <h3>Nueva tarea</h3>
    <input id="taskName" placeholder="Nombre">
    <button onclick="saveTask()">Guardar</button>
  </div>
</div>

<!-- SETTINGS -->
<div class="modal" id="settings">
  <div class="box">
    <h3>Ajustes</h3>

    <label>Días antes de aviso</label>
    <select id="daysBefore">
      <option value="1">1 día</option>
      <option value="3">3 días</option>
      <option value="7">7 días</option>
    </select>

    <button onclick="saveSettings()">Guardar</button>
  </div>
</div>

<script>

/* DATA */
let eventos = JSON.parse(localStorage.getItem("eventos")||"[]");
let settings = JSON.parse(localStorage.getItem("settings")||"{}");

if(!settings.daysBefore) settings.daysBefore=1;

let date = new Date();
let selectedDate=null;
let view="home";

/* RENDER */
function render(){

  if(view==="tasks"){
    renderTasks();
    return;
  }

  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const y=date.getFullYear();
  const m=date.getMonth();

  document.getElementById("title").innerText =
    date.toLocaleString('es',{month:'long',year:'numeric'});

  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1;d<=days;d++){

    let f=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let ev=eventos.filter(e=>e.fecha===f);

    let html=`<strong>${d}</strong>`;

    ev.forEach(e=>{
      let cls=getColor(e.fecha);
      html+=`<span class="badge ${cls}">${e.nombre}</span>`;
    });

    cal.innerHTML+=`
      <div class="day" onclick="create('${f}')">
        ${html}
      </div>`;
  }
}

/* COLOR LOGIC */
function getColor(fecha){
  let diff=(new Date(fecha)-new Date())/86400000;

  if(diff<=2) return "red";
  if(diff<=5) return "yellow";
  return "green";
}

/* CREATE */
function create(f){
  selectedDate=f;
  document.getElementById("modal").classList.add("active");
}

/* SAVE TASK */
function saveTask(){
  let name=document.getElementById("taskName").value;

  eventos.push({nombre:name,fecha:selectedDate});

  localStorage.setItem("eventos",JSON.stringify(eventos));

  document.getElementById("modal").classList.remove("active");

  render();
}

/* TASK LIST */
function renderTasks(){
  const list=document.getElementById("taskList");
  list.innerHTML="";

  eventos.forEach((e,i)=>{
    list.innerHTML+=`
      <div class="task">
        <div>
          <b>${e.nombre}</b>
          <div class="small">${e.fecha}</div>
        </div>
        <button onclick="del(${i})">✕</button>
      </div>`;
  });
}

/* DELETE */
function del(i){
  eventos.splice(i,1);
  localStorage.setItem("eventos",JSON.stringify(eventos));
  render();
}

/* MONTH */
function nextMonth(){date.setMonth(date.getMonth()+1);render();}
function prevMonth(){date.setMonth(date.getMonth()-1);render();}

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

/* SETTINGS */
function openSettings(){
  document.getElementById("settings").classList.add("active");
}

function saveSettings(){
  settings.daysBefore=document.getElementById("daysBefore").value;
  localStorage.setItem("settings",JSON.stringify(settings));
  document.getElementById("settings").classList.remove("active");
}

/* ALARMS */
function openAlarms(){
  alert("Base de alarmas lista (siguiente upgrade: push real)");
}

/* NOTIFICATIONS */
if("Notification" in window && Notification.permission!=="denied"){
  Notification.requestPermission();
}

/* CHECK ALERTS */
setInterval(()=>{

  eventos.forEach(e=>{
    let diff=(new Date(e.fecha)-new Date())/86400000;

    if(diff<=settings.daysBefore && diff>0){

      if(Notification.permission==="granted"){
        new Notification("📚 Recordatorio",{
          body:e.nombre+" es pronto"
        });
      }
    }

    if(Math.floor(diff)===0){
      if(Notification.permission==="granted"){
        new Notification("🔥 HOY",{
          body:e.nombre
        });
      }
    }

  });

},60000);

render();

</script>

</body>
</html>
