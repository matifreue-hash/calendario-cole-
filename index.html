<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Pro Dark</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0a0a;
  color:white;
  display:flex;
}

/* MENU */
.menu{
  width:220px;
  height:100vh;
  background:#0f172a;
  padding:12px;
}

.menu button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:12px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#111;
  border-radius:10px;
}

/* CALENDAR */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:10px;
}

.day{
  background:#111;
  min-height:70px;
  border-radius:10px;
  padding:6px;
  border:1px solid #222;
  cursor:pointer;
}

.rojo{border:2px solid #ef4444;}
.amarillo{border:2px solid #f59e0b;}
.verde{border:2px solid #22c55e;}

.badge{
  font-size:10px;
  display:block;
  margin-top:3px;
  background:#222;
  padding:2px 4px;
  border-radius:6px;
}

/* TASK LIST */
#taskList{
  margin-top:15px;
}

.task{
  background:#111;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{display:flex;}

.box{
  background:#111;
  padding:15px;
  border-radius:12px;
  width:320px;
}

/* MODERN UI */
.modern h3{
  margin:0 0 12px 0;
  font-size:18px;
}

.field{
  margin-top:10px;
}

.field label{
  font-size:12px;
  opacity:0.7;
}

.field input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  border:1px solid #222;
  background:#0a0a0a;
  color:white;
}

.time-wrap{
  display:flex;
  align-items:center;
  gap:8px;
  background:#0a0a0a;
  border:1px solid #222;
  padding:8px;
  border-radius:10px;
  margin-top:5px;
}

.time-wrap input{
  border:none;
  background:transparent;
  color:white;
  width:100%;
}

.btn-modern{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  font-weight:700;
  cursor:pointer;
}

.btn-modern:hover{
  transform:scale(1.02);
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <h3>📅 Menú</h3>

  <button onclick="goHome()">🏠 Inicio</button>
  <button onclick="scrollTasks()">📋 Tareas</button>
  <button onclick="openSettings()">⚙ Ajustes</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <button onclick="prevMonth()">◀</button>
    <h3 id="title"></h3>
    <button onclick="nextMonth()">▶</button>
  </div>

  <div class="grid" id="cal"></div>

  <h3>📋 Tareas y Exámenes</h3>
  <div id="taskList"></div>

</div>

<!-- MODAL TAREA -->
<div class="modal" id="modal">
  <div class="box modern">

    <h3>➕ Nueva tarea</h3>

    <div class="field">
      <label>Nombre</label>
      <input id="name" placeholder="Ej: Examen de Matemática">
    </div>

    <div class="field">
      <label>⏰ Hora de alarma</label>
      <div class="time-wrap">
        <span>🕒</span>
        <input id="time" type="time">
      </div>
    </div>

    <button class="btn-modern" onclick="save()">Guardar tarea</button>

  </div>
</div>

<script>

let eventos = JSON.parse(localStorage.getItem("e")||"[]");
let date = new Date();
let selected = null;

/* CALENDAR */
function render(){

  let cal=document.getElementById("cal");
  cal.innerHTML="";

  let y=date.getFullYear();
  let m=date.getMonth();

  document.getElementById("title").innerText =
  date.toLocaleString("es",{month:"long",year:"numeric"});

  let first=new Date(y,m,1).getDay();
  let days=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1; d<=days; d++){

    let f=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let ev=eventos.filter(e=>e.fecha===f);

    let clase=getColor(f);

    let html=`<strong>${d}</strong>`;

    ev.forEach(e=>{
      html+=`<span class="badge">${e.nombre}</span>`;
    });

    cal.innerHTML+=`
      <div class="day ${clase}" onclick="openTask('${f}')">
        ${html}
      </div>`;
  }

  renderList();
}

/* COLOR */
function getColor(fecha){
  let ev=eventos.filter(e=>e.fecha===fecha);
  if(!ev.length) return "";

  let hoy=new Date();
  let f=new Date(fecha);
  let diff=(f-hoy)/86400000;

  if(diff<=5) return "rojo";
  if(diff<=10) return "amarillo";
  return "verde";
}

/* LIST */
function renderList(){
  let list=document.getElementById("taskList");
  list.innerHTML="";

  eventos.forEach((e,i)=>{
    list.innerHTML+=`
      <div class="task">
        <div>
          <b>${e.nombre}</b><br>
          <small>${e.fecha} ${e.hora||""}</small>
        </div>
        <button onclick="del(${i})">✕</button>
      </div>`;
  });
}

/* ADD */
function openTask(f){
  selected=f;
  document.getElementById("modal").classList.add("active");
}

function save(){
  let n=document.getElementById("name").value;
  let t=document.getElementById("time").value;

  if(!n || !t) return;

  eventos.push({
    nombre:n,
    fecha:selected,
    hora:t,
    notificado:false
  });

  localStorage.setItem("e",JSON.stringify(eventos));

  document.getElementById("modal").classList.remove("active");
  render();
}

/* DELETE */
function del(i){
  eventos.splice(i,1);
  localStorage.setItem("e",JSON.stringify(eventos));
  render();
}

/* NAV */
function nextMonth(){date.setMonth(date.getMonth()+1);render();}
function prevMonth(){date.setMonth(date.getMonth()-1);render();}
function goHome(){date=new Date();render();}
function scrollTasks(){document.getElementById("taskList").scrollIntoView({behavior:"smooth"});}

/* 🔔 ALARMA SIMPLE */
setInterval(()=>{

  let now=new Date();
  let h=String(now.getHours()).padStart(2,"0");
  let m=String(now.getMinutes()).padStart(2,"0");

  let today=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

  eventos.forEach(e=>{

    if(e.fecha===today && e.hora===`${h}:${m}` && !e.notificado){

      if(Notification.permission==="granted"){
        new Notification("🔔 Tarea",{body:e.nombre});
      }

      e.notificado=true;
      localStorage.setItem("e",JSON.stringify(eventos));
    }

  });

},30000);

/* INIT */
window.addEventListener("DOMContentLoaded",()=>{
  if(Notification.permission!=="granted"){
    Notification.requestPermission();
  }
  render();
});

</script>

</body>
</html>
