<h1>FUNCIONA VERSION NUEVA</h1>
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Escolar</title>

<style>
body{font-family:Arial;margin:0;background:#f2f4f8}

header{
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.menu{font-size:24px;cursor:pointer}

.sidebar{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#fff;
padding:10px;
transition:.3s;
overflow:auto;
}

.sidebar.open{left:0}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
box-sizing:border-box;
}

.evento{
background:#fff;
margin:10px;
padding:10px;
border-radius:10px;
position:relative;
}

.rojo{border-left:5px solid red}
.amarillo{border-left:5px solid orange}
.verde{border-left:5px solid green}

button.delete{
position:absolute;
right:10px;
top:10px;
width:auto;
}

button.edit{
position:absolute;
right:60px;
top:10px;
width:auto;
}
</style>
</head>

<body>

<header>
<div class="menu" onclick="toggleMenu()">☰</div>
<h3>📚 Calendario Escolar</h3>
</header>

<!-- MENU -->
<div class="sidebar" id="menu">

<input id="buscador" placeholder="🔍 Buscar materia" oninput="renderMaterias()">

<hr>

<div id="materias"></div>

<hr>

<button onclick="filtro='todos';render()">Todas</button>
<button onclick="filtro='tarea';render()">Tareas</button>
<button onclick="filtro='examen';render()">Exámenes</button>
<button onclick="filtro='tp';render()">TP</button>
<button onclick="filtro='expo';render()">Exposiciones</button>

</div>

<!-- FORM -->
<form id="form">
<input id="nombre" placeholder="Nombre" required>
<input id="materia" placeholder="Materia" required>
<input type="date" id="fecha" required>

<select id="tipo">
<option value="tarea">Tarea</option>
<option value="examen">Examen</option>
<option value="tp">TP</option>
<option value="expo">Exposición</option>
</select>

<button>Agregar</button>
</form>

<div id="lista"></div>

<script>

let eventos = [];
let filtro = "todos";

// cargar seguro
try {
eventos = JSON.parse(localStorage.getItem("eventos")) || [];
} catch(e){
eventos = [];
}

// guardar
function save(){
localStorage.setItem("eventos", JSON.stringify(eventos));
}

// dias
function dias(fecha){
let h=new Date();h.setHours(0,0,0,0);
let f=new Date(fecha);f.setHours(0,0,0,0);
return Math.ceil((f-h)/86400000);
}

// color
function color(d){
if(d<=5)return"rojo";
if(d<=10)return"amarillo";
return"verde";
}

// render principal
function render(){

eventos.sort((a,b)=>dias(a.fecha)-dias(b.fecha));

let div=document.getElementById("lista");
div.innerHTML="";

eventos.forEach((e,i)=>{

if(filtro!="todos" && filtro!=e.tipo) return;

let d=dias(e.fecha);

div.innerHTML+=`
<div class="evento ${color(d)}">
<b>${e.nombre}</b><br>
📚 ${e.materia}<br>
📅 ${e.fecha}<br>
${d==0?"🔥 ES HOY":"⏳ "+d+" días"}

<button class="edit" onclick="edit(${i})">✏️</button>
<button class="delete" onclick="del(${i})">🗑️</button>
</div>`;
});

renderMaterias();
save();
}

// agregar seguro
document.getElementById("form").addEventListener("submit",e=>{
e.preventDefault();

let n=document.getElementById("nombre");
let m=document.getElementById("materia");
let f=document.getElementById("fecha");
let t=document.getElementById("tipo");

if(!n.value||!m.value||!f.value)return;

eventos.push({
nombre:n.value,
materia:m.value,
fecha:f.value,
tipo:t.value
});

e.target.reset();
render();
});

// eliminar
function del(i){
eventos.splice(i,1);
render();
}

// editar (nombre + fecha)
function edit(i){

let n=prompt("Nombre:",eventos[i].nombre);
let f=prompt("Fecha (AAAA-MM-DD):",eventos[i].fecha);

if(n)eventos[i].nombre=n;
if(f)eventos[i].fecha=f;

render();
}

// menu
function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
}

// materias
function renderMaterias(){

let q=document.getElementById("buscador").value.toLowerCase();

let mats=[...new Set(eventos.map(e=>e.materia))];

let div=document.getElementById("materias");
div.innerHTML="";

mats
.filter(m=>m.toLowerCase().includes(q))
.forEach(m=>{
div.innerHTML+=`<button onclick="ver('${m}')">${m}</button>`;
});
}

// ver materia
function ver(m){

let lista=eventos.filter(e=>e.materia===m);

let txt="📚 "+m+"\n\n";

lista.forEach(e=>{
txt+=`
📖 ${e.nombre}
📅 ${e.fecha}
Tipo: ${e.tipo}

----------------
`;
});

alert(txt);
}

// iniciar
render();

</script>

</body>
</html>
